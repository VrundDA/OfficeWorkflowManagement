{% extends "tasks/base/base.html" %}

{% block body %}
<div class="container mt-5">
    <div>
        <form class="col-6 mx-auto card p-3 shadow-lg" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h2>Register</h2>
        <hr>
        {% if messages %}
            <div class="alert alert-primary" role="alert">
                {% for message in messages %}
                {{ message }}
                {% endfor %}
            </div>
        {% endif %}
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">First Name</label>
            <input class="form-control" name="{{ form.first_name.name }}" value="{{ form.first_name.value|default_if_none:'' }}" type="text">
        </div>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Last Name</label>
            <input class="form-control" name="{{ form.last_name.name }}" value="{{ form.last_name.value|default_if_none:'' }}" type="text">
        </div>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Username</label>
            <input class="form-control" name="{{ form.username.name }}" value="{{ form.username.value|default_if_none:'' }}" type="text">
        </div>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email</label>
            <input class="form-control" name="{{ form.email.name }}" value="{{ form.email.value|default_if_none:'' }}" type="email">
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Password</label>
            <input class="form-control" name="{{ form.password.name }}" value="{{ form.password.value|default_if_none:'' }}" type="password">
        </div>
        <div>
            <p>Already have an account! <a href="/login/">Login</a> </p>
        </div>
        <button type="submit" class="btn btn-success">Register</button>
        </form>
    </div>
</div>
{% endblock %}
